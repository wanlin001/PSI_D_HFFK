[Output]
output_directory = "projects/0608_model4_V-50H100/output"
tf_time_stamp = false

[Observations.SplittingIntensity.ShearWave]
filename = "psi_input/DUMMY_SplittingIntensity_ShearWave.dat"

[Model]
parameterisation = "ElasticVoigt"
tf_global_cartesian = false
# psitomo 需要先重跑 VIZTOMO (Eulerian=1) 才會存在
# 生成後路徑約為: /home/wl/work/ASPECT/0608_model4_V-50H100/viztomo_output/psitomo0050.dat
theModel = "/home/wl/work/ASPECT/0608_model4_V-50H100/viztomo_output/psitomo0050.dat"

[Model.CoordinateSystem]
type = "LocalGeographic"

[Model.Mesh]
type = "RegularGrid"

[Model.Aquisition]
source_data   = "psi_input/Sources.dat"
receiver_data = "psi_input/Receivers.dat"

[Model.Methods.TauP]
reference_model = "psi_input/ak135_no_crust.tvel"
DL = 10.0

[Model.Methods.FiniteFrequency]
dominant_period = 8.0
n_rings = 3
n_azimuth = 8
