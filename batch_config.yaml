# ============================================================
# PSI_D / ECOMAN Batch Plot Configuration
# ============================================================
# 每個 model 是一個 entry，batch_run.py 會逐一跑所有 model
# 路徑可以是絕對路徑或相對於 batch_config.yaml 所在目錄的相對路徑
# ============================================================

# 全域設定（所有 model 共用，可在各 model 內 override）
global:
  observations:
    - path: "psi_input/SP_obs_SKS.dat"
      label: "Taiwan SKS obs"
      phase: "SKS"
    - path: "psi_input/SP_obs_SKKS.dat"
      label: "Taiwan SKKS obs"
      phase: "SKKS"

  plot:
    quiver_skip: 1           # 每站畫一條（load_sp 已做 circular mean）
    quiver_fixed_len: true
    misfit_vmin: -45.0       # phi misfit colorbar (deg)
    misfit_vmax:  45.0
    misfit_mode: "model_phi_uncertainty_min"   # or "raw"
    vmax_si: null            # null = auto (98th percentile per panel)
    out_dir: "figs"          # 輸出圖放這裡

# ============================================================
# Models
# ============================================================
models:

  - name: "SinkingSlab"
    label: "Sinking Slab (reference)"
    psi_output_base: "psi_output"   # 相對路徑

    methods:

      - label: "ECOMAN SKS-SPLIT"
        type: "ecoman"
        sks_txt: null               # 暫時沒有，等 wl2 跑完後填路徑
        # sks_txt: "../../0605_model4_V-50H100-weakerLM/drexm_output/splitting/plot_data_0050.txt"

      - label: "Ray Theory"
        type: "psi_ray"
        si_file: "psi_output/SinkingSlab_ray/SYN_SplittingIntensity_ShearWave.dat"
        sp_file: "psi_output/SinkingSlab_sp_ray/SYN_SplittingParameters_ShearWave.dat"

      - label: "HFFK 8s"
        type: "psi_hffk"
        period_s: 8
        si_file: "psi_output/SinkingSlab_hffk8s/SYN_SplittingIntensity_ShearWave.dat"
        sp_file: "psi_output/SinkingSlab_sp_hffk8s/SYN_SplittingParameters_ShearWave.dat"

      - label: "HFFK 25s"
        type: "psi_hffk"
        period_s: 25
        si_file: "psi_output/SinkingSlab_hffk25s/SYN_SplittingIntensity_ShearWave.dat"
        sp_file: "psi_output/SinkingSlab_sp_hffk25s/SYN_SplittingParameters_ShearWave.dat"

    # model-level overrides（選填）
    # plot:
    #   vmax_si: 0.3

  # ──────────────────────────────────────────────────────────
  # 之後新增其他模型只要複製上面的 block 改路徑即可
  # ──────────────────────────────────────────────────────────
  # - name: "TaiwanSKS"
  #   label: "Taiwan SKS (multiBAZ)"
  #   ...
