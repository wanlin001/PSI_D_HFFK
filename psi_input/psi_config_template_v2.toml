# PSI_D config template v2 — 0608_model4_V-50H100
# Placeholders filled by job scripts via sed:
#   __OUTPUT_DIR__  → psi_output/<tag>
#   __MODEL_DAT__   → viztomo_output/psitomo<step>_fix2.dat
#   __OBS_TYPE__    → SplittingIntensity  or  SplittingParameters
#   __OBS_FILE__    → absolute path to DUMMY observation file
#   __HFFK_SP__     → (only for SplittingParameters) tf_hffk_sp = true/false
#   __PERIOD__      → dominant period (s)
#   __N_RINGS__     → Fresnel zone radial rings  (>=1 for HFFK)
#   __N_AZIMUTH__   → azimuthal samples per ring
#   __SOURCES_DAT__ → absolute path to Sources.dat

[Output]
output_directory = "__OUTPUT_DIR__"
tf_time_stamp = false

[Observations.__OBS_TYPE__.ShearWave]
filename = "__OBS_FILE__"
__HFFK_SP__

[Model]
parameterisation = "ElasticVoigt"
tf_global_cartesian = false
theModel = "__MODEL_DAT__"

[Model.CoordinateSystem]
type = "LocalGeographic"

[Model.Mesh]
type = "RegularGrid"

[Model.Aquisition]
source_data   = "__SOURCES_DAT__"
receiver_data = "/home/wl/software/ECOMAN2.0-seismology.PSI_D_HFFK/psi_input/Receivers.dat"

[Model.Methods.TauP]
reference_model = "/home/wl/software/ECOMAN2.0-seismology.PSI_D_HFFK/psi_input/ak135_no_crust.tvel"
DL = 10.0

[Model.Methods.FiniteFrequency]
dominant_period = __PERIOD__
n_rings         = __N_RINGS__
n_azimuth       = __N_AZIMUTH__
