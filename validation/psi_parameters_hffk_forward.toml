##############
### OUTPUT ###
##############

[Output]
output_directory = "psi_output/HFFK_SinkingSlab"
tf_time_stamp = false

#######################
### FORWARD PROBLEM ###
#######################

[Observations.SplittingIntensity.ShearWave]
filename = "psi_input/DUMMY_SplittingIntensity_ShearWave.dat"

[Model]
parameterisation = "HexagonalVectoralVelocity"
theModel = "psi_input/psitomo0020.dat"

[Model.CoordinateSystem]
type = "LocalGeographic"

[Model.Mesh]
type = "RegularGrid"

[Model.Aquisition]
source_data   = "psi_input/Sources.dat"
receiver_data = "psi_input/Receivers.dat"

# TauP: 提供射線路徑（HFFK 也需要 1D ray path 作為積分骨架）
[Model.Methods.TauP]
reference_model = "psi_input/ak135_no_crust.tvel"
DL = 10.0

# HFFK forward method（覆蓋 TauP 的 kernel 積分方式）
[Model.Methods.FiniteFrequency]
dominant_period = 15.0    # (s) VanderBeek 2021 用 15 s dominant period
n_rings   = 3
n_azimuth = 8
